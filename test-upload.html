<!DOCTYPE html>
<html>
<head>
  <title>S3 Upload Test</title>
</head>
<body>

  <h2>Upload Document</h2>

  <input type="text" id="title" placeholder="Document Title" />
  <br><br>

  <input type="file" id="file" />
  <br><br>

  <button onclick="uploadFile()">Upload</button>

  <script>

    async function uploadFile() {

      const formData = new FormData();

      formData.append(
        "title",
        document.getElementById("title").value
      );

      formData.append(
        "document",
        document.getElementById("file").files[0]
      );

      const response = await fetch(
        "http://localhost:5000/api/documents/upload",
        {
          method: "POST",

          headers: {
            Authorization:
              "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6ImI0OTc2MWRjLWY1NDMtNGU1NC1iNmM3LWNkZmQxYWFkYjUyNiIsInJvbGUiOiJDbGllbnQiLCJpYXQiOjE3ODAxMzMzODksImV4cCI6MTc4MDIxOTc4OX0.Qdl2Nqp_Be1c6QRnbh_NnXs-6YT3wmtgKyxvCzg1cRU"
          },

          body: formData
        }
      );

      const data = await response.json();

      console.log(data);

      alert(JSON.stringify(data));
    }

  </script>

</body>
</html>
